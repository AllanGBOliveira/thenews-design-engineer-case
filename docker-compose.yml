services:
  thenews:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: thenews
    restart: unless-stopped
    ports:
      - "${PORT:-5173}:5173"
    env_file:
      - .env
    volumes:
      - .:/app
    command: sh -c "npm install --loglevel verbose && npm run dev -- --host"
    networks:
      - app

networks:
  app:
    driver: bridge
