services:
  thenews:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: thenews
    restart: unless-stopped
    ports:
      - "${PORT:-5173}:5173"
    env_file:
      - .env
    volumes:
      - .:/app
      # Isolate container node_modules (Alpine/musl) from the host bind mount.
      # Without this, `npm install` inside the container overwrites the host's
      # glibc bindings with musl ones, breaking the host's dev tooling.
      - thenews_node_modules:/app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host"
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  thenews_node_modules:
